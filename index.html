<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Cinema</title>
<link rel="icon" type="image/png" href="favicon.ico">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div class="Page" id="one">
<body>
    <style>
        body {
            background-color: #515151;
        }
    </style>
    <header class="d-flex align-items-center justify-content-between px-3 py-2">
        <div class="input-group mb-3">
            <input class="form-control rounded-pill mx-4 mt-3 align-self-center w-25" type="text"
                placeholder="Search..." aria-label="Search..." style="background: lightgrey;">
            <button type="button" class="btn btn-link btn-sm text-muted">Log In</button>
            <button type="button" class="btn btn-link btn-sm text-muted">Register</button>
            <img src="logo1.png" alt="Logo" class="mx-3 mt-3" style="height: 150px;">
        </div>
    </header>
    <div class="col-3 p-3 mb-2 text-white rounded-top rounded-bottom text-center" style="font-size: 20px;">
        Friends Picks
        <style>
            .col-3 {
                background-color: #CB30E0;

            }
        </style>
    </div>

</body>
</div>

<div class="Page" id="two"> 
<body class="bg-black text-white">

<!-- HEADER -->
<div class="d-flex justify-content-center p-2 bg-black">
    <img src="logo.png" alt="Logo" style="height:100px; cursor:pointer;">
</div>

<!-- MAIN LAYOUT -->
<div class="container-fluid p-4">
    <div class="row g-3">

        <!-- VIDEO SECTION -->
        <div class="col-lg-9">

            <div class="position-relative border border-2"
                 style="border-color:#c13ccf; box-shadow:0 0 15px #c13ccf; height:500px;">

                <video id="movie" controls class="w-100 h-100">
                    <source src="movie.mp4" type="video/mp4">
                </video>

                <!-- PROGRESS BAR -->
                <div class="position-absolute bottom-0 w-100" style="height:10px; background:#222;">
                    <div style="width:72%; height:100%; background:red;"></div>
                </div>

                <!-- MARKERS -->
                <div class="position-absolute bg-danger rounded-circle"
                     style="left:70%; bottom:15px; width:15px; height:10px;"></div>

                <div class="position-absolute bg-white rounded-circle"
                     style="left:60%; bottom:15px; width:5px; height:10px;"></div>

                <div class="position-absolute bg-white rounded-circle"
                     style="left:65%; bottom:15px; width:5px; height:10px;"></div>

            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="col-lg-3 d-flex align-items-center justify-content-center bg-secondary text-center">
            WATCHERS AND POSITION IN FILM
        </div>

    </div>
</div>

<!-- CHAT SECTION -->
<div class="container p-4 mt-3 border rounded-5"
     style="border:3px solid #c13ccf; box-shadow:0 0 20px #c13ccf;">

    <div class="row g-3">

        <!-- TIMELINE -->
        <div class="col-auto position-relative">
            <div style="width:40px;">
                <div class="position-absolute top-0 bottom-0 start-50 translate-middle-x"
                     style="width:2px; background:white;"></div>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="col">

            <div class="overflow-auto" style="max-height:200px;">

                <div class="mb-3" style="cursor:pointer;">
                    <div class="text-secondary small">0:00:01</div>
                    No way!
                </div>

                <div class="mb-3" style="cursor:pointer;">
                    <div class="text-secondary small">0:00:04</div>
                    Plot twist!
                </div>

                <div class="mb-3" style="cursor:pointer;">
                    <div class="text-secondary small">0:00:09</div>
                    !!!
                </div>

                <div class="mb-3" style="cursor:pointer;">
                    <div class="text-secondary small">0:00:10</div>
                    Love!
                </div>

            </div>

            <!-- INPUT -->
            <div class="input-group mt-3">
                <input type="text" id="messageInput" class="form-control" placeholder="Type a comment...">
                <button class="btn text-white" style="background:#c13ccf;" >Send</button>
            </div>

        </div>
    </div>
</div>
</div>
<footer>Contact</footer>
</body>
</html>
